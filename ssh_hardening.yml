---

- name: Harden SSH Authentication
  hosts: servers
  become: yes
  tasks:

  - name: Disable Password Login
    lineinfile:
      path: /etc/ssh/sshd_config
      regexp: "^#?PasswordAuthentication"
      line: "PasswordAuthentication no"
      validate: "/usr/sbin/sshd -t -t %s"
      backup: yes
    notify: Restart_SSH

  - name: Disable Root Login
    lineinfile:
      path: /etc/ssh/sshd_config
      regexp: "^#?PermitRootLogin"
      line: "PermitRootLogin no"
      backup: yes
      validate: "/usr/sbin/sshd -t -f %s"
    notify: Restart_SSH

  - name: Allow Specific Users to Login Via SSH
    lineinfile:
      path: /etc/ssh/sshd_config
      regexp: "^#?AllowUsers"
      line: "AllowUsers ansible"
      backup: yes
      validate: "/usr/sbin/sshd -t -f %s"
    notify: Restart_SSH

  - name: Limit Maximum Authentication Attempts
    lineinfile:
      path: /etc/ssh/sshd_config
      regexp: "^#?MaxAuthTries"
      line: "MaxAuthTries 3"
      backup: yes
      validate: "/usr/sbin/sshd -t -f %s"
    notify: Restart_SSH

  - name: Create SSH Banner
    copy:
      dest: /etc/ssh/sshd_banner
      content: |
        ************************** WARNING **************************
        This system is for authorized use only.
        All connections are monitored and recorded.
        Unauthorized access is prohibited and will be prosecuted.
        *************************************************************
      mode: 0644
  
  - name: Enable SSH Banner
    lineinfile:
      path: /etc/ssh/sshd_config
      regexp: "^#?Banner"
      line: "Banner /etc/ssh/sshd_banner"
      validate: "/usr/sbin/sshd -t -f %s"
      backup: yes
    notify: Restart_SSH
  
  handlers:
    - name: Restart_SSH
      service:
        name: ssh
        state: restarted
