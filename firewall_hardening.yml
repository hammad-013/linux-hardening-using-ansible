---

- name: Harden Firewall and Intrusion Prevention
  hosts: servers
  become: yes
  tasks:

  - name: Install UFW and Fail2Ban
    apt:
      name:
        - ufw
        - fail2ban
      state: latest
      update_cache: yes

  - name: Reset UFW
    ufw:
      state: reset

  - name: Set Default Firewall Policies (Deny All)
    ufw:
      default: deny
      direction: incoming

  - name: Set Default Outgoing Policy (Allow)
    ufw:
      default: allow
      direction: outgoing

  - name: Allow SSH (Avoid Locking Out)
    ufw:
      rule: allow
      port: 22
      proto: tcp
      
  - name: Enable UFW
    ufw:
      state: enabled
